<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/quiz.css">
    <title>Document</title>
</head>

<body>
    <header>
        Basic HTML and CSS Quiz
    </header>

    <main>
        <form>
            <label for="q1"> 1. What does the acronym CSS stand for?</label>
            <input type="text" id="q1" name="q1" required>
            <label for="q2"> 2. How are id and class attributes selected in CSS?</label>
            <textarea name="q2" id="q2" rows="4" required></textarea>
            <label for="q3">3. Which of the following is a valid CSS comment?</label>
            <select name="q3" id="q3" required>
                <option value="" selected disabled>Choose One...</option>
                <option value="choice 1">main { }</option>
                <option value="choice 2">.main</option>
                <option value="choice 3">unkown</option>
            </select>
            <label for="q4">What is the bottom margin given this declaration?</label>
            <p>margin: 10px 5px 15px;</p>
            <input type="number" id="q4" name="q4" required>
            <button type="submit">Submit Quiz</button>
        </form>
    </main>

</body>

</html>

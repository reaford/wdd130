<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page for White Water Rafting</title>
    <meta name="description" content="This is the landing page for the White Water Rafting Co">
    <meta name="author" content="Reaford Beldon">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-wwr-oars.jpg" alt="WWR logo">
        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="hero">
            <img src="images/heroindex.jpg" alt="wwrriver background">
            <h1>Your Next Adventure Awaits</h1>
            <article class="index">
                <form>
                    <div class="booknow">
                        <label for="bookplace">Reserve Your place</label>
                        <a href="trips.html">
                            <button id="bookplace" type="button">Book Now</button></a>
                    </div>
                </form>
            </article>
        </div>
        <section class="indexs">

            <div class="overview">
                <figure>
                    <img src="images/camping.jpg" alt="Temp image">
                    <figcaption>🛖</figcaption>
                    <figcaption>Camping</figcaption>
                </figure>
                <figure>
                    <img src="images/rapids.jpg" alt="Temp image">
                    <figcaption>🚣‍♂️</figcaption>
                    <figcaption>Rapids</figcaption>
                </figure>
                <figure>
                    <img src="images/trails.jpg" alt="Temp image">
                    <figcaption>🚶‍♂️‍➡️</figcaption>
                    <figcaption>Trails</figcaption>
                </figure>
            </div>
        </section>
        <section>
            <h2>Sign-Up To Our News Letter</h2>
            <div class="adventure">
                <form>
                    <div class="signup">
                        <div class="col1">
                            <label for="name">Full Name:</label>
                            <input type="text" id="name" name="name">
                        </div>
                        <div class="col1">
                            <label for="email">Your Email:</label>
                            <input type="email" id="email" name="email">
                        </div>
                        <button>Submit</button>
                </form>
            </div>
            </div>
        </section>

    </main>
    <footer>
        <p>&copy;2026 White Water Rafting • Reaford Beldon •</p>
        <nav class="socialmedia">
            <a href="https://facebook.com"> <img src="images/facebook.svg" alt="Facebook"
                  width="50">
            </a>
            <a href="https://x.com"><img src="images/x-bw.svg" alt="x" width="50"></a>
            <a href="https://instagram.com"><img src="images/instagram.svg" alt="instagram"
                  width="50"></a>
        </nav>
    </footer>
</body>

</html>

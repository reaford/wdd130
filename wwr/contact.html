<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact white water rafting</title>
    <meta name="description" content="This page is the contact page for the White Water rafting company along with address, map 
    and contact number">
    <meta name="author" content="Reaford Beldon">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-wwr-oars.jpg" alt="WWR logo">
        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h3>White Water Rafting</h3>
        <p>12 Piet Pompies Avenue</p>
        <p>Put Sonder Water</p>
        <P>+27 012 345 6789</P>
        <p>info@waterrafting.co.za</p>

        <div class="contact">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3481.6662640163204!2d21.86950116873312!3d-29.233369548907213!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1c27b2bac6222b25%3A0x8d4bf4ac6d94066b!2sPutsonderwater!5e0!3m2!1sen!2sza!4v1775061438073!5m2!1sen!2sza"
              width="auto" height="auto" allowfullscreen="" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"></iframe>
            <form>
                <div class="form-item column2">
                    <label for="fullname">Name</label>
                    <input type="text" id="fullname" name="fullname" required>
                </div>
                <div class="form-item column2">
                    <label for="useremail"> Email</label>
                    <input type="email" id="useremail" name="useremail" required>
                </div>
                <div class="purpose">
                    <p>Message Purpose</p>
                    <div class="form-item column1">
                        <label for="generalinquiry">General Inquiry</label>
                        <input type="radio" id="generalinquiry" name="generalinquiry">
                    </div>
                    <div class="form-item column1">
                        <label for="resevationrequest">Reservation Request</label>
                        <input type="radio" id="resevationrequest" name="resevationrequest">
                    </div>
                    <div class="form-item column1">
                        <label for="websitesuggestion">Website Suggestion</label>
                        <input type="radio" id="websitesuggestion" name="websitesuggestion">
                    </div>
                </div>
                <div class="form-item column1">
                    <label for="message">Message</label>
                    <textarea name="message" id="message" rows="4"
                      placeholder="Type here."></textarea>
                </div>
                <button type="submit"> Get in Touch!</button>
            </form>
        </div>
    </main>
    <footer>
        <p>&copy;2026 White Water Rafting • Reaford Beldon •</p>
        <nav class="socialmedia">
            <a href="https://facebook.com"> <img src="images/facebook.svg" alt="Facebook"
                  width="50">
            </a>
            <a href="https://x.com"><img src="images/x-bw.svg" alt="x" width="50"></a>
            <a href="https://instagram.com"><img src="images/instagram.svg" alt="instagram"
                  width="50"></a>
        </nav>
    </footer>
</body>

</html>
